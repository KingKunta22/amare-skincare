<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amare Skincare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="main-header">
    <div class="logo">
      <h1>AMARE</h1>
    </div>
    <nav>
      <ul id="nav-menu">
        <li><a href="/" data-page="home">Home</a></li>
        <li><a href="/products" data-page="products">Products</a></li>
        <li><a href="/about" data-page="about">About</a></li>
        <li><a href="/contact" data-page="contact">Contact</a></li>
        <li><a href="/team" data-page="team">Team</a></li>
      </ul>
    </nav>
    <div class="header-right">
      <a href="/cart" class="cart-icon" data-page="cart">
        <i class="fas fa-shopping-bag"></i>
        <span id="cart-count">0</span>
      </a>
    </div>
  </header>

  <main id="app">
    <!-- Dynamic content loads here -->
  </main>

  <!-- Mini Cart Slide-out -->
  <div id="mini-cart" class="mini-cart">
    <div class="mini-cart-header">
      <h3>Your Cart</h3>
      <button id="close-mini-cart"><i class="fas fa-times"></i></button>
    </div>
    <div id="mini-cart-items"></div>
    <div class="mini-cart-footer">
      <p>Total: ₱<span id="mini-cart-total">0</span></p>
      <a href="/checkout" class="btn" data-page="checkout">Checkout</a>
    </div>
  </div>
  <div id="overlay" class="overlay"></div>

  <!-- Back to Top Button -->
  <button id="back-to-top" class="back-to-top"><i class="fas fa-arrow-up"></i></button>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <footer>
    <div class="footer-links">
      <a href="/suppliers" data-page="suppliers">Suppliers</a>
      <a href="/reviews" data-page="reviews">Reviews</a>
      <a href="/order-status" data-page="order-status">Order Status</a>
    </div>
    <p>&copy; 2025 Amare Skincare. All rights reserved.</p>
  </footer>

  <script src="js/toast.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/router.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
