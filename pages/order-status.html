<!-- ORDER STATUS PAGE -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="section-label">Track Your Package</div>
    <h1>Order Status</h1>
    <p>Enter your Order ID below to check your shipment status.</p>
  </div>
</div>

<div class="order-status-outer">
  <div class="status-demo-note">
    <strong style="color:var(--accent);">Demo Order IDs:</strong>
    AM-2024-001 · AM-2024-002 · AM-2025-003 · AM-2025-004
  </div>
  <form id="order-status-form">
    <div class="form-group">
      <label class="form-label">Order ID</label>
      <input type="text" id="order-id-input" class="form-input" placeholder="e.g. AM-2025-003" required
        style="text-transform:uppercase;letter-spacing:0.05em;">
    </div>
    <button type="submit" class="btn-main" style="margin-top:0.5rem;">Track Order</button>
  </form>
  <div id="order-status-result"></div>
</div>
