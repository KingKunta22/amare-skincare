<!-- REVIEWS PAGE -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="section-label">Community</div>
    <h1>Reviews</h1>
    <p>Real results from real people. Share your Amare experience.</p>
  </div>
</div>

<div class="reviews-outer">
  <!-- RATING SUMMARY -->
  <div style="display:flex;align-items:center;gap:2rem;background:var(--white);border:1px solid var(--border);padding:1.5rem;margin-bottom:2.5rem;" class="fade-up">
    <div style="text-align:center;flex-shrink:0;">
      <div style="font-size:2.8rem;font-weight:800;color:var(--accent);line-height:1;">4.9</div>
      <div style="color:#e6a817;font-size:1rem;margin:4px 0;">★★★★★</div>
      <div style="font-size:0.7rem;color:var(--text-lt);">Average Rating</div>
    </div>
    <div style="width:1px;height:60px;background:var(--border);flex-shrink:0;"></div>
    <p style="font-size:0.83rem;color:var(--text-mid);line-height:1.8;">
      Our customers are our biggest advocates. Every review motivates us to keep improving, innovating, and loving what we do.
    </p>
  </div>

  <div class="reviews-layout">
    <!-- LIST -->
    <div>
      <div class="section-label" style="margin-bottom:1rem;">What People Are Saying</div>
      <div id="review-list"></div>
    </div>

    <!-- FORM -->
    <div>
      <div class="review-form-box">
        <div class="review-form-title">Write a Review</div>
        <form id="review-form">
          <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" id="review-name" class="form-input" placeholder="Maria Santos" required>
          </div>
          <div class="form-group">
            <label class="form-label">Rating</label>
            <div class="star-rating">
              <button type="button" class="star-btn" data-star="1">★</button>
              <button type="button" class="star-btn" data-star="2">★</button>
              <button type="button" class="star-btn" data-star="3">★</button>
              <button type="button" class="star-btn" data-star="4">★</button>
              <button type="button" class="star-btn" data-star="5">★</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Your Review</label>
            <textarea id="review-text" class="form-textarea" placeholder="Tell us about your experience..." required></textarea>
          </div>
          <button type="submit" class="btn-main" style="width:100%;">Submit Review</button>
        </form>
      </div>
    </div>
  </div>
</div>
