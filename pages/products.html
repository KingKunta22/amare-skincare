<!-- PRODUCTS PAGE -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="section-label">Browse</div>
    <h1>Our Products</h1>
    <p>Gentle, effective skincare for every skin type.</p>
  </div>
</div>

<div class="filters-bar">
  <div class="filters-bar-inner">
    <div class="filter-group">
      <label class="filter-label">Search</label>
      <input type="text" class="filter-input" id="search-input" placeholder="Search products...">
    </div>
    <div class="filter-group">
      <label class="filter-label">Category</label>
      <select class="filter-select" id="category-filter">
        <option value="">All Categories</option>
        <option value="Cleansers">Cleansers</option>
        <option value="Toners">Toners</option>
        <option value="Moisturizers">Moisturizers</option>
        <option value="Serums">Serums</option>
        <option value="Masks">Masks</option>
        <option value="Sunscreen">Sunscreen</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Max Price</label>
      <div class="range-labels"><span>₱500</span><span id="price-range-val">₱5,000</span></div>
      <input type="range" id="price-range" min="500" max="5000" step="50" value="5000">
    </div>
    <button class="filter-clear-btn" id="filter-clear">Clear</button>
  </div>
</div>

<div class="products-count" id="products-count">Loading...</div>

<div style="padding:0 24px 60px;max-width:1200px;margin:0 auto;">
  <div class="products-grid" id="products-grid"></div>
</div>
