<!-- CHECKOUT PAGE -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="section-label">Almost There</div>
    <h1>Checkout</h1>
  </div>
</div>

<div class="checkout-outer">
  <div class="checkout-layout">
    <!-- FORM -->
    <div>
      <form id="checkout-form">
        <div class="checkout-section">
          <div class="checkout-section-title">Contact Information</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="co-name" class="form-input" placeholder="Maria Santos" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" placeholder="maria@email.com" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" placeholder="+63 9xx xxx xxxx" required>
          </div>
        </div>

        <div class="checkout-section">
          <div class="checkout-section-title">Shipping Address</div>
          <div class="form-group">
            <label class="form-label">Street Address / Barangay</label>
            <input type="text" class="form-input" placeholder="123 Main St., Brgy. Example" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">City / Municipality</label>
              <input type="text" class="form-input" placeholder="Manila" required>
            </div>
            <div class="form-group">
              <label class="form-label">Province</label>
              <input type="text" class="form-input" placeholder="Metro Manila" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Region</label>
              <select class="form-select">
                <option value="">Select Region</option>
                <option>NCR</option>
                <option>Region I – Ilocos Region</option>
                <option>Region II – Cagayan Valley</option>
                <option>Region III – Central Luzon</option>
                <option>Region IV-A – CALABARZON</option>
                <option>Region IV-B – MIMAROPA</option>
                <option>Region V – Bicol Region</option>
                <option>Region VI – Western Visayas</option>
                <option>Region VII – Central Visayas</option>
                <option>Region VIII – Eastern Visayas</option>
                <option>Region IX – Zamboanga Peninsula</option>
                <option>Region X – Northern Mindanao</option>
                <option>Region XI – Davao Region</option>
                <option>Region XII – SOCCSKSARGEN</option>
                <option>Region XIII – Caraga</option>
                <option>BARMM</option>
                <option>CAR</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">ZIP Code</label>
              <input type="text" class="form-input" placeholder="1000" required>
            </div>
          </div>
        </div>

        <div class="checkout-section">
          <div class="checkout-section-title">Payment Details</div>
          <div style="background:var(--bg-soft);border:1px solid var(--border);padding:0.8rem 1rem;margin-bottom:1.2rem;font-size:0.76rem;color:var(--text-lt);">
            <i class="fas fa-lock" style="color:var(--accent);margin-right:0.4rem;"></i>
            Simulated checkout — no real payments are processed.
          </div>
          <div class="form-group">
            <label class="form-label">Payment Method</label>
            <select class="form-select">
              <option>Credit / Debit Card</option>
              <option>GCash</option>
              <option>Maya (PayMaya)</option>
              <option>Bank Transfer</option>
              <option>Cash on Delivery</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Card Number</label>
            <input type="text" class="form-input" placeholder="•••• •••• •••• ••••" maxlength="19">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Expiry</label>
              <input type="text" class="form-input" placeholder="MM / YY" maxlength="7">
            </div>
            <div class="form-group">
              <label class="form-label">CVV</label>
              <input type="text" class="form-input" placeholder="•••" maxlength="3">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Name on Card</label>
            <input type="text" class="form-input" placeholder="Maria Santos">
          </div>
        </div>

        <button type="submit" class="btn-main" style="padding:0.85rem 2rem;">Place Order</button>
      </form>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="checkout-order-box">
      <div class="checkout-order-title">Order Summary</div>
      <div id="checkout-order-items"></div>
      <div style="margin-top:1.2rem;border-top:1px solid var(--border);padding-top:1rem;">
        <div class="cart-summary-row"><span>Subtotal</span><span id="checkout-subtotal">₱0</span></div>
        <div class="cart-summary-row"><span>Shipping</span><span id="checkout-shipping">₱0</span></div>
        <div class="cart-summary-row total"><span>Total</span><span id="checkout-total">₱0</span></div>
      </div>
      <p style="margin-top:1rem;font-size:0.7rem;color:var(--text-lt);line-height:1.7;">
        <i class="fas fa-shield-alt" style="color:var(--accent);margin-right:0.3rem;"></i>
        Your information is safe and encrypted.
      </p>
    </div>
  </div>
</div>
