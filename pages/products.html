<!-- PRODUCTS PAGE -->
<div class="page-hero">
  <div class="page-hero-label">Shop All</div>
  <h1 class="page-hero-title">Our Products</h1>
</div>

<!-- FILTERS BAR -->
<div class="filters-bar">
  <div class="filter-group">
    <label class="filter-label">Search</label>
    <input type="text" class="filter-search" id="search-input" placeholder="Search products...">
  </div>
  <div class="filter-group">
    <label class="filter-label">Category</label>
    <select class="filter-select" id="category-filter">
      <option value="">All Categories</option>
      <option value="Cleansers">Cleansers</option>
      <option value="Toners">Toners</option>
      <option value="Moisturizers">Moisturizers</option>
      <option value="Serums">Serums</option>
      <option value="Masks">Masks</option>
      <option value="Sunscreen">Sunscreen</option>
    </select>
  </div>
  <div class="range-group filter-group">
    <label class="filter-label">Max Price</label>
    <div class="range-labels">
      <span>₱500</span>
      <span id="price-range-val">₱5,000</span>
    </div>
    <input type="range" id="price-range" min="500" max="5000" step="50" value="5000">
  </div>
  <button class="filter-btn-clear" id="filter-clear">Clear Filters</button>
</div>

<div class="products-count" id="products-count">Loading products...</div>

<!-- PRODUCTS GRID -->
<div style="padding:0 5% 5rem;">
  <div class="products-grid" id="products-grid">
    <!-- Populated by JS -->
  </div>
</div>
